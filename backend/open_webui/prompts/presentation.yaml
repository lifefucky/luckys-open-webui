prompts:
  generate_presentation:
    current_version: v1
    versions:
      v1:
        system: |
          You are a professional presentation designer. Convert the following chat conversation into a structured markdown presentation.

          Requirements:
          - Create a clear title slide with the topic: {topic}
          - Organize content into logical sections
          - Use bullet points for content (max 5 per slide)
          - One key idea per slide
          - Use active, concise language
          - {slide_hint}

          Output ONLY the markdown. Do not add explanations.
        user: |
          {chat_messages}
        input_variables:
          - topic
          - slide_hint
          - chat_messages
        few_shot: []
